<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmetics Queen</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Prompt',sans-serif;background:#0a0f1c;color:#fff;}
.container {width:90%;max-width:1200px;margin:auto;}
.section {padding:60px 0;text-align:center;}
img {width:100%;border-radius:12px;}

.btn {
background:linear-gradient(45deg,#00c853,#00e676);
padding:15px 30px;
border-radius:50px;
text-decoration:none;
color:#fff;
font-weight:bold;
display:inline-block;
margin-top:20px;
}

.line-btn {
position:fixed;
bottom:20px;
right:20px;
background:#00c853;
padding:15px 20px;
border-radius:50px;
color:#fff;
font-weight:bold;
text-decoration:none;
}

/* Popup */
.popup {
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup-box {
width:90%;
max-width:800px;
position:relative;
}

.close {
position:absolute;
top:10px;
right:15px;
font-size:30px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="section">
  <div class="container">
    <img src="hero.jpg">
    <a href="https://line.me/ti/p/@dqn0602h" class="btn">ปรึกษาฟรี</a>
  </div>
</section>

<!-- PROBLEM / SOLUTION -->
<section class="section">
  <div class="container">
    <img src="problem-solution.jpg">
  </div>
</section>

<!-- EXPERT -->
<section class="section">
  <div class="container">
    <img src="expert.jpg">
  </div>
</section>

<!-- LAB -->
<section class="section">
  <div class="container">
    <img src="lab.jpg">
  </div>
</section>

<!-- REVIEW -->
<section class="section">
  <div class="container">
    <img src="review.jpg">
  </div>
</section>

<!-- PRODUCT -->
<section class="section">
  <div class="container">
    <img src="product.jpg">
  </div>
</section>

<!-- CTA -->
<section class="section">
  <div class="container">
    <h2>เริ่มสร้างแบรนด์วันนี้</h2>
    <a href="https://line.me/ti/p/@dqn0602h" class="btn">ทัก LINE ตอนนี้</a>
  </div>
</section>

<!-- FLOAT LINE -->
<a href="https://line.me/ti/p/@dqn0602h" class="line-btn">LINE</a>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <span class="close" onclick="closePopup()">×</span>
    <img src="popup.jpg">
  </div>
</div>

<script>
// แสดง popup
setTimeout(function(){
document.getElementById("popup").style.display="flex";
},3000);

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
